<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog | Vinod Kumar Gorrepati</title>
  <meta name="description" content="Technical writing on embedded systems, IoT, and AI-assisted engineering workflows by Vinod Kumar Gorrepati.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06131d;
      --panel: rgba(11, 27, 39, 0.9);
      --line: rgba(136, 183, 207, 0.16);
      --text: #e8f3f8;
      --muted: #95aebe;
      --cyan: #65e3ff;
      --mint: #9ff5c5;
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(101, 227, 255, 0.16), transparent 24%),
        linear-gradient(180deg, #06131d 0%, #081925 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 84px 84px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.85) 44%, transparent 84%);
      z-index: -1;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
    }

    .eyebrow,
    .date,
    .tag,
    .back-link {
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
    }

    .hero {
      padding: 34px 0 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.76rem;
      text-transform: uppercase;
    }

    .eyebrow {
      display: inline-block;
      margin-top: 26px;
      color: var(--cyan);
      font-size: 0.76rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 12px;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      max-width: 10ch;
    }

    .hero p {
      max-width: 62ch;
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      padding: 16px 0 42px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
      padding: 24px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(15, 33, 46, 0.9), rgba(8, 19, 28, 0.96));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .date {
      color: var(--cyan);
      font-size: 0.74rem;
      text-transform: uppercase;
    }

    .card h2 {
      margin: 0;
      font-size: 1.28rem;
      line-height: 1.2;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: auto;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 0.72rem;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      color: #08121a;
      background: linear-gradient(135deg, var(--cyan), var(--mint));
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      font-size: 0.74rem;
      text-transform: uppercase;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .container { width: min(1100px, calc(100% - 22px)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <a class="back-link" href="/">Back to portfolio</a>
      <div class="eyebrow">Writing</div>
      <h1>Technical notes and project thinking</h1>
      <p>Posts on embedded systems, IoT delivery, validation workflows, and practical AI usage around engineering work.</p>
    </section>

    <section>
      <div id="list" class="grid" aria-live="polite"></div>
    </section>
  </div>

  <script type="module">
    const list = document.getElementById("list");
    const posts = await (await fetch("/posts/posts.json", { cache: "no-store" })).json();
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    if (!posts.length) {
      list.innerHTML = '<article class="card"><h2>No posts yet.</h2><p style="margin:0;color:var(--muted);line-height:1.7">Add entries to <code>/posts/posts.json</code> to publish writing here.</p></article>';
    } else {
      list.innerHTML = posts.map((post) => `
        <article class="card">
          <div class="date">${new Date(post.date).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" })}</div>
          <h2>${post.title}</h2>
          <div class="tag-row">${(post.tags || []).map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
          <a class="card-link" href="/blog/post.html?slug=${encodeURIComponent(post.slug)}">Read post</a>
        </article>
      `).join("");
    }
  </script>
</body>
</html>
