<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="pageTitle">Post | Vinod Kumar Gorrepati</title>
  <meta name="description" content="Technical writing by Vinod Kumar Gorrepati.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: #06131d;
      --panel: rgba(11, 27, 39, 0.92);
      --line: rgba(136, 183, 207, 0.16);
      --text: #e8f3f8;
      --muted: #95aebe;
      --cyan: #65e3ff;
      --mint: #9ff5c5;
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(101, 227, 255, 0.16), transparent 24%),
        linear-gradient(180deg, #06131d 0%, #081925 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 84px 84px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.88) 42%, transparent 84%);
      z-index: -1;
    }

    a { color: inherit; text-decoration: none; }
    code { font-family: "IBM Plex Mono", monospace; }

    .container {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }

    .back-link,
    .meta,
    .tag {
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.76rem;
      text-transform: uppercase;
    }

    .shell {
      margin-top: 24px;
      padding: 28px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(15, 33, 46, 0.9), rgba(8, 19, 28, 0.96));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .meta {
      color: var(--cyan);
      font-size: 0.74rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      text-transform: uppercase;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 0.72rem;
    }

    .prose {
      margin-top: 28px;
    }

    .prose > :first-child { margin-top: 0; }
    .prose h1,
    .prose h2,
    .prose h3 {
      margin: 1.3em 0 0.45em;
      text-transform: none;
      letter-spacing: normal;
      line-height: 1.15;
    }

    .prose h2 { font-size: 1.8rem; }
    .prose h3 { font-size: 1.35rem; }

    .prose p,
    .prose li,
    .prose blockquote {
      color: var(--muted);
      line-height: 1.9;
      font-size: 1.02rem;
    }

    .prose ul,
    .prose ol {
      padding-left: 1.3rem;
    }

    .prose a {
      color: var(--cyan);
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }

    .prose code {
      font-size: 0.92em;
      padding: 0.16em 0.4em;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
    }

    .prose pre {
      overflow: auto;
      padding: 18px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .prose pre code {
      padding: 0;
      background: transparent;
    }

    .prose blockquote {
      margin: 1.6rem 0;
      padding: 0.2rem 0 0.2rem 1rem;
      border-left: 3px solid rgba(101, 227, 255, 0.42);
    }

    @media (max-width: 640px) {
      .container { width: min(860px, calc(100% - 22px)); }
      .shell { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="/blog/">Back to blog</a>
    <article class="shell">
      <div class="meta" id="postDate"></div>
      <h1 id="postTitle">Loading…</h1>
      <div class="tag-row" id="tags"></div>
      <article class="prose" id="content"></article>
    </article>
  </div>

  <script type="module">
    const params = new URLSearchParams(location.search);
    const slug = params.get("slug");

    if (!slug) {
      location.href = "/blog/";
    }

    const posts = await (await fetch("/posts/posts.json", { cache: "no-store" })).json();
    const meta = posts.find((post) => post.slug === slug);

    if (!meta) {
      document.getElementById("postTitle").textContent = "Post not found";
      document.getElementById("content").innerHTML = "<p>The requested post could not be found.</p>";
      throw new Error("Post not found");
    }

    const raw = await (await fetch("/posts/" + meta.file, { cache: "no-store" })).text();

    function parseFrontMatter(source) {
      if (!source.startsWith("---")) return [{}, source];
      const end = source.indexOf("\n---", 3);
      if (end === -1) return [{}, source];

      const block = source.slice(3, end).trim();
      const body = source.slice(end + 4).trim();
      const frontMatter = {};

      block.split("\n").forEach((line) => {
        const separator = line.indexOf(":");
        if (separator === -1) return;

        const key = line.slice(0, separator).trim();
        let value = line.slice(separator + 1).trim();
        if (value.startsWith("[")) {
          try {
            value = JSON.parse(value.replace(/'/g, "\""));
          } catch (error) {
            // Ignore malformed arrays and preserve the raw value.
          }
        }

        frontMatter[key] = typeof value === "string" ? value.replace(/^"(.*)"$/, "$1") : value;
      });

      return [frontMatter, body];
    }

    const [frontMatter, body] = parseFrontMatter(raw);
    const title = frontMatter.title || meta.title;
    const date = frontMatter.date || meta.date;
    const tags = meta.tags || [];

    document.getElementById("pageTitle").textContent = title + " | Vinod Kumar Gorrepati";
    document.getElementById("postTitle").textContent = title;
    document.getElementById("postDate").textContent = new Date(date).toLocaleDateString(undefined, {
      year: "numeric",
      month: "short",
      day: "numeric"
    });
    document.getElementById("tags").innerHTML = tags.map((tag) => `<span class="tag">${tag}</span>`).join("");

    marked.setOptions({
      mangle: false,
      headerIds: true
    });

    const html = marked.parse(body);
    document.getElementById("content").innerHTML = DOMPurify.sanitize(html);
  </script>
</body>
</html>
